name: "Deploy React App on Github Pages"
on:
    push:
        branches:
            - main
    workflow_dispatch:

jobs:
    setup:
        runs-on: ubuntu-latest
        steps:
            - name: "Setup Node Env for Vite App"
              uses: actions/setup-node@v6
            
            - name: "Install PNPM"
              run: "npm i -g pnpm"
            
            - name: "Cache node_modules"
              uses: actions/cache@v4
              with:
                path: "~/.npm"
                key: "${{runner.os}}-node-${{ hashFiles('**/package-lock.json') }}"
    
    test:
        runs-on: ubuntu-latest
        steps:
            - name: "Test Vite App"
              run: "npm run test"
    
    build:
        runs-on: ubuntu-latest
        steps:
            - name: "Build Vite App"
              run: "npm run build"

            - name: "Upload Vite App Artifact"
              uses: actions/upload-artifact@v7
              with:
                name: "Vite Production App"
                path: "dist/"
        
    download_artifact:
        runs-on: ubuntu-latest
        steps:
            - name: "Download Vite Artifact"
              uses: actions/download-artifact@v8
              with:
                name: "Vite Production App"
                path: "dist/"
                
    deploy:
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{steps.deployment.outputs.page_url}} # 
        steps:
            - name: "Deploy to Github Pages"
              id: "deployment"
              uses: actions/deploy-pages@v4
